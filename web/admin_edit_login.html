<!DOCTYPE html>
<html lang="id"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Login — My Lord Panel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#0d1117;color:#e6edf3;height:100dvh;
display:flex;align-items:center;justify-content:center;}
.card{width:320px;background:#161b22;border:1px solid #21262d;border-radius:12px;
padding:28px 24px;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.card h1{font-size:18px;text-align:center;margin-bottom:4px;color:#e6edf3;}
.card p{font-size:12px;text-align:center;color:#8b949e;margin-bottom:20px;}
label{display:block;font-size:12px;color:#8b949e;margin:14px 0 6px;}
input{width:100%;padding:10px 12px;background:#0d1117;border:1px solid #30363d;
border-radius:8px;color:#e6edf3;font-size:14px;outline:none;}
input:focus{border-color:#58a6ff;}
button{width:100%;margin-top:20px;padding:11px;background:#1f6feb;border:none;
border-radius:8px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;}
button:hover{background:#388bfd;}
#msg{margin-top:14px;font-size:12.5px;text-align:center;color:#f85149;min-height:16px;}
</style></head>
<body>
<div class="card">
  <h1>👑 My Lord Panel</h1>
  <p>Login admin untuk sunting database member</p>
  <form id="loginForm">
    <label>Username</label>
    <input type="text" id="username" autocomplete="username" required>
    <label>Password</label>
    <input type="password" id="password" autocomplete="current-password" required>
    <button type="submit">Masuk</button>
  </form>
  <div id="msg"></div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');
  msg.style.color = '#f85149';
  msg.textContent = 'Memeriksa...';
  try{
    const res = await fetch('/api/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if(res.ok){
      msg.style.color = '#3fb950';
      msg.textContent = data.message || 'Berhasil';
      setTimeout(()=>{ window.location.href = '/'; }, 400);
    } else {
      msg.textContent = data.error || 'Gagal login';
    }
  }catch(err){
    msg.textContent = 'Tidak bisa terhubung ke server';
  }
});
</script>
</body></html>
